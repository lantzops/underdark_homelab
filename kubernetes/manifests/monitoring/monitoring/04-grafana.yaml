###############################################################################
# Grafana
#
# Grafana is the visualization layer — it queries Prometheus and renders
# dashboards with graphs, gauges, and alerts.
#
# This deployment includes:
#   - Pre-configured Prometheus datasource (no manual setup needed)
#   - Persistent storage for dashboards and settings
#   - NodePort access on port 30030
#
# Default credentials:
#   Username: admin
#   Password: admin (you'll be prompted to change on first login)
#
# After deploying, access Grafana at:
#   http://<any-worker-node-ip>:30030
#
# Recommended first steps after login:
#   1. Change the admin password
#   2. Import dashboard ID 1860 (Node Exporter Full) — covers host metrics
#   3. Import dashboard ID 15760 (Kubernetes Cluster Overview)
#   4. Import dashboard ID 13332 (kube-state-metrics v2)
#
# To import a dashboard:
#   Dashboards → New → Import → Enter ID → Load → Select "Prometheus" datasource
#
# Deploy with:
#   kubectl apply -f 04-grafana.yaml
###############################################################################

---
# ConfigMap — Grafana datasource provisioning
# This auto-configures Prometheus as a datasource on first boot
# so you don't have to do it manually in the UI
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    app: grafana
data:
  # Grafana reads YAML files from /etc/grafana/provisioning/datasources/
  # on startup to auto-provision datasources
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        # This URL works because both are in the "monitoring" namespace
        # Format: http://<service-name>.<namespace>.svc.cluster.local:<port>
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: true
        jsonData:
          timeInterval: "15s"

---
# ConfigMap — Grafana dashboard provisioning config
# Tells Grafana to look in /var/lib/grafana/dashboards for dashboard JSON files
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: monitoring
  labels:
    app: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: 'Kubernetes'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false

---
# ConfigMap — A starter Kubernetes cluster overview dashboard
# This gives you immediate visibility into your cluster without importing anything
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    app: grafana
data:
  cluster-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "red", "value": 85 }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "title": "Cluster CPU Usage",
          "type": "gauge",
          "targets": [
            {
              "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "CPU Usage %"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "red", "value": 85 }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 0 },
          "id": 2,
          "options": {
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "title": "Cluster Memory Usage",
          "type": "gauge",
          "targets": [
            {
              "expr": "100 * (1 - (sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes)))",
              "legendFormat": "Memory Usage %"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.5 }
                ]
              }
            }
          },
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 0 },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "Pods Running",
          "type": "stat",
          "targets": [
            {
              "expr": "sum(kube_pod_status_phase{phase=\"Running\"})",
              "legendFormat": "Running"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            }
          },
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 0 },
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "Nodes Ready",
          "type": "stat",
          "targets": [
            {
              "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})",
              "legendFormat": "Ready"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 20,
                "spanNulls": false
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "id": 5,
          "options": { "legend": { "displayMode": "table" }, "tooltip": { "mode": "multi" } },
          "title": "CPU Usage per Node",
          "type": "timeseries",
          "targets": [
            {
              "expr": "100 - (avg by(instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 20,
                "spanNulls": false
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "id": 6,
          "options": { "legend": { "displayMode": "table" }, "tooltip": { "mode": "multi" } },
          "title": "Memory Usage per Node",
          "type": "timeseries",
          "targets": [
            {
              "expr": "100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "spanNulls": false
              },
              "unit": "Bps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 14 },
          "id": 7,
          "title": "Network Traffic per Node (Received)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(node_network_receive_bytes_total{device!~\"lo|veth.*|cali.*|flannel.*\"}[5m])",
              "legendFormat": "{{instance}} - {{device}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 20,
                "spanNulls": false
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 14 },
          "id": 8,
          "title": "Disk Usage per Node",
          "type": "timeseries",
          "targets": [
            {
              "expr": "100 - ((node_filesystem_avail_bytes{mountpoint=\"/\",fstype!=\"rootfs\"} / node_filesystem_size_bytes{mountpoint=\"/\",fstype!=\"rootfs\"}) * 100)",
              "legendFormat": "{{instance}}"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["kubernetes", "cluster"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Underdark Cluster Overview",
      "uid": "underdark-cluster-overview"
    }

---
# PersistentVolumeClaim for Grafana data (dashboards, users, settings)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: monitoring
  labels:
    app: grafana
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  # storageClassName: local-path

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
        runAsNonRoot: true
      containers:
        - name: grafana
          image: grafana/grafana:11.3.2
          env:
            # Default admin credentials — change after first login!
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            # Allow embedding and anonymous access for convenience (disable in prod)
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
          # If no PV provisioner, use emptyDir instead:
          # emptyDir: {}
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: dashboards
          configMap:
            name: grafana-dashboards

---
# Service — NodePort on 30030
# Access at: http://<any-node-ip>:30030
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
      nodePort: 30030
      protocol: TCP
