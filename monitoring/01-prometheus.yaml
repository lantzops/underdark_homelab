###############################################################################
# Prometheus Server
#
# Prometheus is a time-series database and monitoring system. It scrapes
# metrics from configured targets at regular intervals, stores them, and
# makes them available for querying via PromQL.
#
# This deployment includes:
#   - ClusterRole with permissions to discover and scrape all K8s endpoints
#   - ConfigMap with scrape configs for nodes, pods, cadvisor, and apiserver
#   - Persistent storage via PVC (5Gi — adjust to your needs)
#   - Deployment with proper security context
#   - Service exposing the Prometheus UI on NodePort 30090
#
# After deploying, access Prometheus at:
#   http://<any-worker-node-ip>:30090
#
# Deploy with:
#   kubectl apply -f 01-prometheus.yaml
###############################################################################

---
# ServiceAccount for Prometheus
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus

---
# ClusterRole — Prometheus needs broad read access to discover scrape targets
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
  labels:
    app: prometheus
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - nodes/metrics
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]

---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
  labels:
    app: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring

---
# ConfigMap — Prometheus configuration and scrape targets
#
# This is where the magic happens. Each scrape_config block defines:
#   - job_name: human-readable name for the group of targets
#   - kubernetes_sd_configs: how Prometheus discovers targets via the K8s API
#   - relabel_configs: transforms discovered labels into useful metadata
#
# Prometheus uses "relabeling" to filter/transform targets before scraping.
# __meta_kubernetes_* labels are auto-populated by K8s service discovery.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
data:
  prometheus.yml: |
    # Global settings apply to all scrape configs unless overridden
    global:
      scrape_interval: 15s        # How often to scrape targets
      evaluation_interval: 15s    # How often to evaluate alerting rules
      scrape_timeout: 10s         # Per-scrape timeout

    # Scrape Configurations
    scrape_configs:

      #----------------------------------------------------------------------
      # 1. Prometheus scrapes itself (useful for monitoring Prometheus health)
      #----------------------------------------------------------------------
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_label_app]
            action: keep
            regex: node-exporter
          - source_labels: [__meta_kubernetes_endpoints_name]
            action: replace
            target_label: instance
      #----------------------------------------------------------------------
      # 2. Kubernetes API Server
      #    Scrapes the API server's /metrics endpoint for control plane metrics
      #----------------------------------------------------------------------
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        # Only keep the "kubernetes" service in the "default" namespace
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https

      #----------------------------------------------------------------------
      # 3. Kubelet metrics
      #    Each kubelet exposes metrics about pod lifecycle, volumes, etc.
      #----------------------------------------------------------------------
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          # Use the node's name as the instance label
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      #----------------------------------------------------------------------
      # 4. cAdvisor (Container Advisor)
      #    Embedded in the kubelet — provides container-level CPU, memory,
      #    filesystem, and network usage metrics. This is the primary source
      #    for per-container resource monitoring.
      #----------------------------------------------------------------------
      - job_name: 'kubernetes-cadvisor'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        # Rewrite the metrics path from /metrics to /metrics/cadvisor
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __metrics_path__
            replacement: /metrics/cadvisor

      #----------------------------------------------------------------------
      # 5. Kubernetes Service Endpoints
      #    Auto-discovers any service with the annotation:
      #      prometheus.io/scrape: "true"
      #    Optionally respects:
      #      prometheus.io/port: "<port>"
      #      prometheus.io/path: "<path>"
      #      prometheus.io/scheme: "https"
      #----------------------------------------------------------------------
      - job_name: 'kubernetes-service-endpoints'
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          # Only scrape endpoints with prometheus.io/scrape=true
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          # Override scheme if prometheus.io/scheme is set
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scheme]
            action: replace
            target_label: __scheme__
            regex: (https?)
          # Override path if prometheus.io/path is set
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # Override port if prometheus.io/port is set
          - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
          # Carry over useful labels
          - action: labelmap
            regex: __meta_kubernetes_service_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: service

      #----------------------------------------------------------------------
      # 6. Kubernetes Pods (direct scrape)
      #    Auto-discovers pods with the annotation:
      #      prometheus.io/scrape: "true"
      #    Useful for pods not behind a service.
      #----------------------------------------------------------------------
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod

---
# PersistentVolumeClaim — storage for Prometheus TSDB (time-series database)
# Adjust storage size based on retention needs. 15 days of data for a small
# cluster typically fits in 5-10Gi.
#
# NOTE: This uses the default StorageClass. If your cluster doesn't have a
# dynamic provisioner, you'll need to either:
#   1. Create a PersistentVolume manually, or
#   2. Switch to emptyDir (data lost on pod restart — uncomment below)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: monitoring
  labels:
    app: prometheus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # Uncomment and set if you have a specific StorageClass:
  # storageClassName: local-path

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      # Prometheus writes to /prometheus — the container runs as user 65534
      # (nobody). We set fsGroup so the PVC is writable.
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.3
          args:
            # Path to the config we mount from the ConfigMap
            - '--config.file=/etc/prometheus/prometheus.yml'
            # Where to store time-series data
            - '--storage.tsdb.path=/prometheus'
            # How long to keep data (15 days default)
            - '--storage.tsdb.retention.time=15d'
            # Enable the /-/reload endpoint so you can hot-reload config
            - '--web.enable-lifecycle'
            # Enable admin API (useful for snapshots, TSDB management)
            - '--web.enable-admin-api'
          ports:
            - name: web
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /-/ready
              port: web
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: web
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
          # If you don't have a StorageClass / PV provisioner, uncomment
          # the emptyDir below and comment out the PVC above:
          # emptyDir: {}

---
# Service — NodePort so you can access Prometheus UI from your network
# Access at: http://<any-node-ip>:30090
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name: web
      port: 9090
      targetPort: web
      nodePort: 30090
      protocol: TCP
